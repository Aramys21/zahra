<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Connexion Admin - Zahra Diffusion</title>
    <link rel="icon" type="image/png" href="../assets/logo.png" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
    <script defer src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../css/styles.css" />
  </head>
  <body class="bg-gradient-to-br from-sky-100 to-sky-200 min-h-screen flex items-center justify-center">
    <div class="w-full max-w-md p-8">
      <div class="bg-white rounded-2xl shadow-2xl p-8">
        <div class="text-center mb-8">
          <div class="mx-auto mb-4 h-16 w-16 rounded-full bg-sky-600 flex items-center justify-center">
            <i class="fas fa-user-shield text-3xl text-white"></i>
          </div>
          <h1 class="text-2xl font-bold text-sky-800">Connexion Admin</h1>
          <p class="mt-2 text-sm text-gray-600">Accès réservé au personnel autorisé</p>
        </div>

        <form id="admin-login-form" class="space-y-6" novalidate>
          <div>
            <label for="admin-email" class="mb-2 block text-sm font-medium text-gray-700">Email Admin</label>
            <div class="relative">
              <span class="absolute left-3 top-1/2 -translate-y-1/2 text-gray-400">
                <i class="fas fa-envelope"></i>
              </span>
              <input
                id="admin-email"
                type="email"
                name="email"
                autocomplete="email"
                class="w-full rounded-lg border border-sky-200 py-3 pl-10 pr-4 focus:border-sky-500 focus:ring-2 focus:ring-sky-200"
                placeholder="admin@zahradiffusion.com"
                required
              />
            </div>
          </div>

          <div>
            <label for="admin-password" class="mb-2 block text-sm font-medium text-gray-700">Mot de passe</label>
            <div class="relative">
              <span class="absolute left-3 top-1/2 -translate-y-1/2 text-gray-400">
                <i class="fas fa-lock"></i>
              </span>
              <input
                id="admin-password"
                type="password"
                name="password"
                autocomplete="current-password"
                class="w-full rounded-lg border border-sky-200 py-3 pl-10 pr-4 focus:border-sky-500 focus:ring-2 focus:ring-sky-200"
                placeholder="••••••••"
                required
              />
            </div>
          </div>

          <button
            type="submit"
            class="btn-primary w-full py-3 text-lg font-semibold"
          >
            <i class="fas fa-sign-in-alt mr-2"></i>Se connecter
          </button>
        </form>

        <div class="mt-6 border-t border-gray-200 pt-6">
          <div class="flex items-center justify-center space-x-2 text-sm text-gray-500">
            <i class="fas fa-shield-alt"></i>
            <span>Connexion sécurisée avec Supabase</span>
          </div>
        </div>

        <div id="admin-login-status" class="mt-4 text-center text-sm"></div>
      </div>

      <div class="mt-6 text-center">
        <a href="../pages/home.html" class="text-sm text-sky-700 hover:text-sky-800">
          <i class="fas fa-arrow-left mr-1"></i>Retour au site
        </a>
      </div>
    </div>

    <script defer src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script type="module" src="../js/admin-login.js"></script>
  </body>
</html>
