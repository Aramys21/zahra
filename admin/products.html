<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gestion des Produits - Zahra Diffusion</title>
    <link rel="icon" type="image/png" href="../assets/logo.png" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
    <script defer src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../css/styles.css" />
  </head>
  <body class="bg-gray-50">
    <div data-component="navbar"></div>
    <main class="container-zahra py-10">
      <div class="mb-8 flex items-center justify-between">
        <h1 class="text-3xl font-bold">Gestion des Produits</h1>
        <a href="index.html" class="btn-secondary">
          <i class="fas fa-arrow-left mr-2"></i>Retour au tableau de bord
        </a>
      </div>

      <section class="mt-10 grid gap-6 lg:grid-cols-2">
        <article class="premium-card p-6">
          <h2 class="text-xl font-semibold" id="form-title">Ajouter un produit</h2>
          <form id="product-form" class="mt-4 grid gap-3">
            <input id="p-name" class="rounded-lg border border-sky-200 p-2" placeholder="Nom produit" required />
            <select id="p-category" class="rounded-lg border border-sky-200 p-2">
              <option value="Femme">Femme</option>
              <option value="Maison">Maison</option>
              <option value="Bebe">Bebe</option>
              <option value="Antibacterien">Antibacterien</option>
            </select>
            <input id="p-price" type="number" class="rounded-lg border border-sky-200 p-2" placeholder="Prix DA" required />
            
            <div>
              <label class="block text-sm font-medium text-gray-700 mb-2">Photos du produit</label>
              <div id="image-upload-zone" class="border-2 border-dashed border-sky-300 rounded-lg p-6 text-center cursor-pointer hover:border-sky-500 hover:bg-sky-50 transition">
                <i class="fas fa-cloud-upload-alt text-3xl text-sky-400 mb-2"></i>
                <p class="text-sm text-gray-600">Cliquez ou glissez vos images ici</p>
                <p class="text-xs text-gray-400 mt-1">PNG, JPG jusqu'à 5MB par image</p>
                <input type="file" id="p-images" multiple accept="image/*" class="hidden" />
              </div>
              <div id="image-preview" class="mt-3 grid grid-cols-4 gap-2"></div>
            </div>
            
            <textarea id="p-description" class="rounded-lg border border-sky-200 p-2" placeholder="Description" rows="3"></textarea>
            <button type="submit" class="btn-primary w-fit">
              <i class="fas fa-plus mr-2"></i>Ajouter produit
            </button>
            <button type="button" id="cancel-edit" class="btn-secondary w-fit hidden">
              <i class="fas fa-times mr-2"></i>Annuler
            </button>
          </form>
        </article>

        <article class="premium-card p-6">
          <h2 class="text-xl font-semibold">Liste des produits</h2>
          <div id="products-table" class="mt-4 space-y-3"></div>
        </article>
      </section>
    </main>
    <div data-component="footer"></div>
    <script type="module" src="../js/main.js"></script>
    <script type="module" src="../js/admin-products.js"></script>
  </body>
</html>
