<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Prive - Zahra Diffusion</title>
    <link rel="icon" type="image/png" href="../assets/logo.png" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
    <script defer src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../css/styles.css" />
  </head>
  <body class="bg-gray-50">
    <div data-component="navbar"></div>
    <main class="container-zahra py-10">
      <h1 class="mb-8 text-3xl font-bold">Tableau de bord admin</h1>
      <section id="admin-access" class="mb-8 premium-card p-6">
        <p class="font-semibold text-sky-700">Espace prive entreprise</p>
        <p class="mt-1 text-sm text-gray-600">
          Acces autorise seulement depuis le domaine admin + compte administrateur.
        </p>
        <p id="admin-access-status" class="mt-2 text-sm text-gray-600"></p>
      </section>
      <div class="grid gap-6 md:grid-cols-3">
        <article class="premium-card p-6">
          <p class="text-sm text-gray-500">Commandes</p>
          <p id="kpi-orders" class="mt-2 text-3xl font-black text-sky-700">0</p>
        </article>
        <article class="premium-card p-6">
          <p class="text-sm text-gray-500">Clients</p>
          <p id="kpi-customers" class="mt-2 text-3xl font-black text-sky-700">0</p>
        </article>
        <article class="premium-card p-6">
          <p class="text-sm text-gray-500">Produits</p>
          <p id="kpi-products" class="mt-2 text-3xl font-black text-sky-700">0</p>
        </article>
      </div>
      <section class="mt-10 premium-card p-6">
        <h2 class="mb-4 text-xl font-semibold">Gestion des commandes</h2>
        <div id="orders-table" class="space-y-3"></div>
      </section>

      <section class="mt-10 grid gap-6 lg:grid-cols-2">
        <article class="premium-card p-6">
          <h2 class="text-xl font-semibold">Ajouter un produit</h2>
          <form id="product-form" class="mt-4 grid gap-3">
            <input id="p-name" class="rounded-lg border border-sky-200 p-2" placeholder="Nom produit" required />
            <select id="p-category" class="rounded-lg border border-sky-200 p-2">
              <option value="Femme">Femme</option>
              <option value="Maison">Maison</option>
              <option value="Bebe">Bebe</option>
              <option value="Antibacterien">Antibacterien</option>
            </select>
            <input id="p-price" type="number" class="rounded-lg border border-sky-200 p-2" placeholder="Prix DA" required />
            
            <!-- Zone d'upload d'images multiples -->
            <div>
              <label class="block text-sm font-medium text-gray-700 mb-2">Photos du produit</label>
              <div id="image-upload-zone" class="border-2 border-dashed border-sky-300 rounded-lg p-6 text-center cursor-pointer hover:border-sky-500 hover:bg-sky-50 transition">
                <i class="fas fa-cloud-upload-alt text-3xl text-sky-400 mb-2"></i>
                <p class="text-sm text-gray-600">Cliquez ou glissez vos images ici</p>
                <p class="text-xs text-gray-400 mt-1">PNG, JPG jusqu'à 5MB par image</p>
                <input type="file" id="p-images" multiple accept="image/*" class="hidden" />
              </div>
              
              <!-- Prévisualisation des images -->
              <div id="image-preview" class="mt-3 grid grid-cols-4 gap-2"></div>
            </div>
            
            <textarea id="p-description" class="rounded-lg border border-sky-200 p-2" placeholder="Description" rows="3"></textarea>
            <button type="submit" class="btn-primary w-fit">
              <i class="fas fa-plus mr-2"></i>Ajouter produit
            </button>
          </form>
        </article>

        <article class="premium-card p-6">
          <h2 class="text-xl font-semibold">Ajouter un article blog</h2>
          <form id="blog-form" class="mt-4 grid gap-3">
            <input id="b-title" class="rounded-lg border border-sky-200 p-2" placeholder="Titre" required />
            <textarea id="b-excerpt" class="rounded-lg border border-sky-200 p-2" placeholder="Resume" required></textarea>
            <button class="btn-primary w-fit">Publier article</button>
          </form>
        </article>
      </section>
    </main>
    <div data-component="footer"></div>
    <script type="module" src="../js/main.js"></script>
    <script type="module" src="../js/admin.js"></script>
  </body>
</html>
