<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gestion des Blogs - Zahra Diffusion</title>
    <link rel="icon" type="image/png" href="../assets/logo.png" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
    <script defer src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../css/styles.css" />
  </head>
  <body class="bg-gray-50">
    <div data-component="navbar"></div>
    <main class="container-zahra py-10">
      <div class="mb-8 flex items-center justify-between">
        <h1 class="text-3xl font-bold">Gestion des Blogs</h1>
        <a href="index.html" class="btn-secondary">
          <i class="fas fa-arrow-left mr-2"></i>Retour au tableau de bord
        </a>
      </div>

      <section class="mt-10 grid gap-6 lg:grid-cols-2">
        <article class="premium-card p-6">
          <h2 class="text-xl font-semibold" id="form-title">Ajouter un article blog</h2>
          <form id="blog-form" class="mt-4 grid gap-3">
            <input id="b-title" class="rounded-lg border border-sky-200 p-2" placeholder="Titre" required />
            <textarea id="b-excerpt" class="rounded-lg border border-sky-200 p-2" placeholder="Resume" required rows="3"></textarea>
            <textarea id="b-content" class="rounded-lg border border-sky-200 p-2" placeholder="Contenu complet" rows="6"></textarea>
            <input id="b-author" class="rounded-lg border border-sky-200 p-2" placeholder="Auteur" />
            <button type="submit" class="btn-primary w-fit">
              <i class="fas fa-plus mr-2"></i>Publier article
            </button>
            <button type="button" id="cancel-edit" class="btn-secondary w-fit hidden">
              <i class="fas fa-times mr-2"></i>Annuler
            </button>
          </form>
        </article>

        <article class="premium-card p-6">
          <h2 class="text-xl font-semibold">Liste des articles</h2>
          <div id="blogs-table" class="mt-4 space-y-3"></div>
        </article>
      </section>
    </main>
    <div data-component="footer"></div>
    <script type="module" src="../js/main.js"></script>
    <script type="module" src="../js/admin-blogs.js"></script>
  </body>
</html>
