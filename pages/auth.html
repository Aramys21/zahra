<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Connexion - Zahra Diffusion</title>
    <link rel="icon" type="image/png" href="../assets/logo.png" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
    <script defer src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../css/styles.css" />
  </head>
  <body class="bg-sky-50">
    <div data-component="navbar"></div>
    <main class="container-zahra py-14">
      <div class="mx-auto max-w-md premium-card p-8">
        <h1 class="text-2xl font-bold" data-translate="compte_client">Compte client</h1>
        <p class="mt-2 text-sm text-gray-600" data-translate="connexion_inscription">Connexion ou création de compte sécurisée.</p>

        <div class="mt-6 flex rounded-xl border border-sky-200 bg-sky-50/80 p-1">
          <button
            type="button"
            id="tab-login"
            class="tab-auth flex flex-1 items-center justify-center rounded-lg py-2.5 text-sm font-semibold transition bg-white text-sky-800 shadow-sm"
            onclick="showLoginForm()"
          >
            <span data-translate="connexion">Connexion</span>
          </button>
          <button
            type="button"
            id="tab-register"
            class="tab-auth flex flex-1 items-center justify-center rounded-lg py-2.5 text-sm font-semibold text-sky-700 transition"
            onclick="showRegisterForm()"
          >
            <span data-translate="inscription">Inscription</span>
          </button>
        </div>

        <form id="auth-form" class="mt-6 space-y-4" novalidate>
          <div id="register-fields" class="hidden space-y-4">
            <div>
              <label for="auth-lastname" class="mb-1 block text-sm font-medium text-gray-700" data-translate="nom">Nom</label>
              <input
                id="auth-lastname"
                type="text"
                name="lastname"
                autocomplete="family-name"
                class="w-full rounded-lg border border-sky-200 p-3"
                placeholder="Votre nom" data-translate-key="nom"
              />
            </div>
            <div>
              <label for="auth-firstname" class="mb-1 block text-sm font-medium text-gray-700" data-translate="prenom">Prénom</label>
              <input
                id="auth-firstname"
                type="text"
                name="firstname"
                autocomplete="given-name"
                class="w-full rounded-lg border border-sky-200 p-3"
                placeholder="Votre prénom" data-translate-key="prenom"
              />
            </div>
            <div>
              <label for="auth-phone" class="mb-1 block text-sm font-medium text-gray-700" data-translate="telephone">Numéro de téléphone</label>
              <input
                id="auth-phone"
                type="tel"
                name="phone"
                autocomplete="tel"
                class="w-full rounded-lg border border-sky-200 p-3"
                placeholder="Ex. 0555123456"
              />
            </div>
            <div>
              <label for="auth-wilaya" class="mb-1 block text-sm font-medium text-gray-700" data-translate="wilaya">Wilaya</label>
              <select
                id="auth-wilaya"
                name="wilaya"
                class="w-full rounded-lg border border-sky-200 bg-white p-3"
              >
                <option value="">— Sélectionnez votre wilaya —</option>
              </select>
            </div>
            <div>
              <label for="auth-address" class="mb-1 block text-sm font-medium text-gray-700" data-translate="adresse">Adresse</label>
              <textarea
                id="auth-address"
                name="address"
                autocomplete="street-address"
                rows="3"
                class="w-full rounded-lg border border-sky-200 p-3"
                placeholder="Rue, ville, code postal…"
              ></textarea>
            </div>
          </div>
          <div>
            <label for="auth-email" class="mb-1 block text-sm font-medium text-gray-700" data-translate="email">Email</label>
            <input
              id="auth-email"
              type="email"
              name="email"
              autocomplete="email"
              required
              class="w-full rounded-lg border border-sky-200 p-3"
              placeholder="vous@exemple.com"
            />
          </div>
          <div>
            <label for="auth-password" class="mb-1 block text-sm font-medium text-gray-700" data-translate="password">Mot de passe</label>
            <input
              id="auth-password"
              type="password"
              name="password"
              autocomplete="current-password"
              required
              minlength="6"
              class="w-full rounded-lg border border-sky-200 p-3"
              placeholder="Au moins 6 caractères"
            />
          </div>
          <div id="actions-login">
            <button type="button" id="sign-in" class="btn-primary w-full" data-translate="se_connecter">Se connecter</button>
          </div>
          <div id="actions-register" class="hidden">
            <button type="button" id="sign-up" class="btn-secondary w-full" data-translate="creer_compte" onclick="signUpWithSupabase()">Créer mon compte</button>
          </div>
        </form>
        <button id="sign-out" class="mt-4 text-sm text-sky-700 underline" data-translate="deconnexion">Déconnexion</button>
        <p id="auth-status" class="mt-3 text-sm text-gray-600"></p>
      </div>
    </main>
    <div data-component="footer"></div>
    <script defer src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script type="module" src="../js/main.js"></script>
    <script type="module" src="../js/translations.js"></script>
    <script type="module" src="../js/auth.js"></script>
    <script>
      // Charger les wilayas
      function loadWilayas() {
        const wilayaEl = document.getElementById('auth-wilaya');
        if (wilayaEl) {
          // Vider d'abord le select
          wilayaEl.innerHTML = '<option value="">Sélectionnez une wilaya</option>';
          
          // Liste des wilayas algériennes
          const wilayas = [
            "Adrar", "Chlef", "Laghouat", "Oum El Bouaghi", "Batna", "Béjaïa", "Biskra", "Béchar", "Blida", "Bouira",
            "Tamanrasset", "Tébessa", "Tlemcen", "Tiaret", "Tizi Ouzou", "Alger", "Djelfa", "Jijel", "Sétif", "Saïda",
            "Skikda", "Sidi Bel Abbès", "Annaba", "Guelma", "Constantine", "Médéa", "Mostaganem", "M'Sila", "Mascara", "Ouargla",
            "Oran", "El Bayadh", "Illizi", "Bordj Bou Arréridj", "Boumerdès", "El Tarf", "Tindouf", "Tissemsilt", "El Oued", "Khenchela",
            "Souk Ahras", "Tipaza", "Mila", "Aïn Defla", "Naâma", "Aïn Témouchent", "Ghardaïa", "Relizane", "Timimoun", "Bordj Baji Mokhtar",
            "Ouled Djellal", "Béni Abbès", "In Salah", "In Guezzam", "Touggourt", "Djanet", "M'Ghaïer", "El M'Ghair"
          ];
          
          wilayas.forEach(wilaya => {
            const opt = document.createElement('option');
            opt.value = wilaya;
            opt.textContent = wilaya;
            wilayaEl.appendChild(opt);
          });
          
          console.log('Wilayas chargées:', wilayas.length, 'wilayas');
        }
      }
      
      // Fonctions directes pour le changement de formulaire
      function showLoginForm() {
        console.log('Show login form');
        const registerFields = document.getElementById('register-fields');
        const actionsLogin = document.getElementById('actions-login');
        const actionsRegister = document.getElementById('actions-register');
        const tabLogin = document.getElementById('tab-login');
        const tabRegister = document.getElementById('tab-register');
        
        // Masquer les champs d'inscription
        registerFields.classList.add('hidden');
        // Afficher les actions de connexion
        actionsLogin.classList.remove('hidden');
        // Masquer les actions d'inscription
        actionsRegister.classList.add('hidden');
        
        // Mettre à jour les styles des onglets
        tabLogin.classList.add('bg-white', 'shadow-sm', 'text-sky-800');
        tabLogin.classList.remove('text-sky-700');
        tabRegister.classList.remove('bg-white', 'shadow-sm', 'text-sky-800');
        tabRegister.classList.add('text-sky-700');
      }
      
      function showRegisterForm() {
        console.log('Show register form');
        const registerFields = document.getElementById('register-fields');
        const actionsLogin = document.getElementById('actions-login');
        const actionsRegister = document.getElementById('actions-register');
        const tabLogin = document.getElementById('tab-login');
        const tabRegister = document.getElementById('tab-register');
        
        // Afficher les champs d'inscription
        registerFields.classList.remove('hidden');
        // Masquer les actions de connexion
        actionsLogin.classList.add('hidden');
        // Afficher les actions d'inscription
        actionsRegister.classList.remove('hidden');
        
        // Mettre à jour les styles des onglets
        tabRegister.classList.add('bg-white', 'shadow-sm', 'text-sky-800');
        tabRegister.classList.remove('text-sky-700');
        tabLogin.classList.remove('bg-white', 'shadow-sm', 'text-sky-800');
        tabLogin.classList.add('text-sky-700');
        
        // Charger les wilayas si ce n'est pas déjà fait
        loadWilayas();
      }
      
      // Fonction d'inscription réelle avec Supabase
      async function signUpWithSupabase() {
        console.log('Sign up with Supabase');
        const email = document.getElementById('auth-email')?.value || '';
        const password = document.getElementById('auth-password')?.value || '';
        const firstName = document.getElementById('auth-firstname')?.value || '';
        const lastName = document.getElementById('auth-lastname')?.value || '';
        const phone = document.getElementById('auth-phone')?.value || '';
        const address = document.getElementById('auth-address')?.value || '';
        const wilaya = document.getElementById('auth-wilaya')?.value || '';
        
        if (!firstName || !lastName || !phone || !wilaya || !address) {
          alert('Veuillez remplir tous les champs obligatoires');
          return;
        }
        
        // Créer le client Supabase directement
        const supabaseUrl = "https://tnnupnnlmkktadmqhzey.supabase.co";
        const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRubnVwbm5sbWtrdGFkbXFoemV5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU5MjAzODYsImV4cCI6MjA5MTQ5NjM4Nn0.NYfitpneLZOLZ4hFqU-2caVeokP1MDhU1ACFTPw6cUU";
        
        try {
          // Créer le client Supabase
          const { createClient } = window.supabase || await import('@supabase/supabase-js');
          const client = createClient ? createClient(supabaseUrl, supabaseKey) : window.supabase.createClient(supabaseUrl, supabaseKey);
          
          console.log('Client Supabase créé:', !!client);
          
          // Utiliser Supabase pour l'inscription
          const { data, error } = await client.auth.signUp({
            email,
            password,
            options: {
              data: {
                first_name: firstName,
                last_name: lastName,
                phone: phone,
                wilaya: wilaya,
                address: address,
                full_name: `${firstName} ${lastName}`.trim()
              }
            }
          });
          
          if (error) {
            console.log('Erreur inscription:', error);
            alert('Erreur lors de l\'inscription: ' + error.message);
          } else {
            console.log('Inscription réussie:', data);
            const message = data.session 
              ? 'Inscription réussie! Vous êtes maintenant connecté.'
              : 'Inscription réussie! Vérifiez votre email pour confirmer votre compte.';
            alert(message);
            
            // Rediriger vers la page d'accueil après inscription
            setTimeout(() => {
              window.location.href = './home.html';
            }, 2000);
          }
        } catch (err) {
          console.log('Erreur générale:', err);
          alert('Erreur: ' + err.message);
        }
      }
      
      // Initialiser au chargement
      document.addEventListener('DOMContentLoaded', function() {
        console.log('DOM chargé - Initialisation...');
        loadWilayas();
      });
    </script>
  </body>
</html>
