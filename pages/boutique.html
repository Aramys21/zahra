<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Boutique - Zahra Diffusion</title>
    <link rel="icon" type="image/png" href="../assets/logo.png" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
    <script defer src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../css/styles.css" />
  </head>
  <body>
    <div data-component="navbar"></div>
    
    <!-- Breadcrumb -->
    <div class="bg-sky-50 border-b border-sky-100">
      <div class="container-zahra py-3">
        <nav class="flex items-center gap-2 text-sm text-gray-600">
          <a href="./home.html" class="hover:text-sky-600 transition">Accueil</a>
          <i class="fas fa-chevron-right text-xs text-gray-400"></i>
          <span class="text-sky-700 font-medium">Boutique</span>
        </nav>
      </div>
    </div>

    <main class="container-zahra py-10">
      <div class="mb-8 flex items-center justify-between">
        <div>
          <h1 class="text-3xl font-bold text-gray-900" data-translate="boutique">Boutique</h1>
          <p class="mt-2 text-sm text-gray-600">Découvrez notre sélection de produits premium</p>
        </div>
        <div class="hidden md:flex items-center gap-2 text-sm text-gray-600">
          <span id="results-count">0 produits</span>
        </div>
      </div>

      <div class="grid gap-8 lg:grid-cols-[280px,1fr]">
        <aside class="premium-card h-fit p-6 sticky top-24">
          <div class="flex items-center justify-between mb-6">
            <h2 class="font-semibold text-gray-900" data-translate="filtres">Filtres</h2>
            <button id="reset-filters" class="text-sm text-sky-600 hover:text-sky-700 transition">
              <i class="fas fa-redo mr-1"></i>Réinitialiser
            </button>
          </div>
          
          <!-- Catégorie -->
          <div class="mb-6">
            <label class="block text-sm font-medium text-gray-700 mb-2" data-translate="categorie">Catégorie</label>
            <select id="filter-category" class="w-full rounded-lg border border-sky-200 p-3 text-sm focus:border-sky-500 focus:ring-2 focus:ring-sky-500/20 transition">
              <option value="" data-translate="toutes">Toutes</option>
              <option value="Femme">Femme</option>
              <option value="Maison">Maison</option>
              <option value="Bebe">Bébé</option>
              <option value="Antibacterien">Antibactérien</option>
            </select>
          </div>

          <!-- Prix -->
          <div class="mb-6">
            <label class="block text-sm font-medium text-gray-700 mb-2" data-translate="prix_max">Prix max</label>
            <div class="flex items-center gap-2">
              <input id="filter-price" type="range" min="500" max="15000" value="15000" class="flex-1 h-2 bg-sky-200 rounded-lg appearance-none cursor-pointer accent-sky-600" />
              <span id="price-display" class="text-sm font-medium text-sky-700 min-w-[80px]">15000 DA</span>
            </div>
            <div class="mt-2 flex justify-between text-xs text-gray-500">
              <span>500 DA</span>
              <span>15000 DA</span>
            </div>
          </div>

          <!-- Tri -->
          <div class="mb-6">
            <label class="block text-sm font-medium text-gray-700 mb-2" data-translate="tri">Tri</label>
            <select id="sort-by" class="w-full rounded-lg border border-sky-200 p-3 text-sm focus:border-sky-500 focus:ring-2 focus:ring-sky-500/20 transition">
              <option value="relevance" data-translate="pertinence">Pertinence</option>
              <option value="price-asc" data-translate="prix_croissant">Prix croissant</option>
              <option value="price-desc" data-translate="prix_decroissant">Prix décroissant</option>
              <option value="name-asc">Nom A-Z</option>
              <option value="name-desc">Nom Z-A</option>
            </select>
          </div>

          <!-- Disponibilité -->
          <div class="mb-6">
            <label class="flex items-center gap-2 cursor-pointer">
              <input type="checkbox" id="filter-stock" class="w-4 h-4 text-sky-600 border-sky-300 rounded focus:ring-sky-500" />
              <span class="text-sm text-gray-700">En stock uniquement</span>
            </label>
          </div>

          <!-- Bouton appliquer -->
          <button id="apply-filters" class="w-full btn-primary text-sm">
            <i class="fas fa-filter mr-2"></i>Appliquer les filtres
          </button>
        </aside>

        <section>
          <!-- Barre d'outils mobile -->
          <div class="mb-6 flex items-center justify-between md:hidden">
            <button id="mobile-filters-btn" class="flex items-center gap-2 rounded-lg border border-sky-200 px-4 py-2 text-sm">
              <i class="fas fa-filter"></i>
              Filtres
            </button>
            <select id="mobile-sort-by" class="rounded-lg border border-sky-200 px-3 py-2 text-sm">
              <option value="relevance">Pertinence</option>
              <option value="price-asc">Prix croissant</option>
              <option value="price-desc">Prix décroissant</option>
            </select>
          </div>

          <!-- Grille produits -->
          <div id="shop-grid" class="grid gap-6 sm:grid-cols-2 xl:grid-cols-3"></div>

          <!-- Pagination -->
          <div id="pagination" class="mt-8 flex items-center justify-center gap-2"></div>

          <!-- Message si aucun résultat -->
          <div id="no-results" class="hidden text-center py-12">
            <i class="fas fa-search text-4xl text-gray-300 mb-4"></i>
            <h3 class="text-lg font-semibold text-gray-700">Aucun produit trouvé</h3>
            <p class="text-sm text-gray-500 mt-2">Essayez de modifier vos filtres</p>
          </div>
        </section>
      </div>
    </main>

    <div data-component="footer"></div>

    <script type="module" src="../js/main.js"></script>
    <script type="module" src="../js/translations.js"></script>
    <script type="module" src="../js/shop.js"></script>
  </body>
</html>
